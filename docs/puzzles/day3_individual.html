<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final Result — Individual Authorization</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="terminal">

  <h1>FINAL RESULT</h1>
  <p>> Processing conclusion...</p>

  <div id="content"></div>

</div>

<script>

const lines = [
  "> Analyzing executive activity logs...",
  "> Comparing authorization sequence...",
  "",
  "> Irregular sequence detected.",
  "",
  "> EXEC-04 initiated directive execution.",
  "> All subsequent approvals followed.",
  "",
  "> Chain reaction confirmed.",
  "",
  "> Conclusion:",
  "> FINAL AUTHORIZATION TRACED TO EXEC-04",
  "",
  "> One action completed the directive.",
  "> Responsibility localized."
];

let i = 0;
const contentDiv = document.getElementById("content");

function typeLine() {
  if(i < lines.length) {
    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if(j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 400);
      }
    }, 20);

  } else {
    triggerFinal();
  }
}

function triggerFinal() {
  const finalMsg = document.createElement("p");
  finalMsg.innerHTML = "<br>> Your conclusion has been recorded.";
  contentDiv.appendChild(finalMsg);
}

window.onload = () => {
  setTimeout(typeLine, 800);
};

</script>

  <script>
setTimeout(() => {
  window.location.href = "final_shutdown.html";
}, 6000);
</script>

</body>
</html>

<body>

<div class="terminal">

  <h1>DATA VALIDATION COMPLETE</h1>
  <p>> Processing recovered data...</p>

  <div id="content"></div>
  <div id="nextPhase"></div>

</div>

<script>

// ===== TYPEWRITER LINES =====
const lines = [
  "> Cross-referencing complete...",
  "> Integrity check failed.",
  "",
  "> WARNING: DATA HAS BEEN ALTERED",
  "",
  "> Previous conclusions are no longer reliable.",
  "> You were working with manipulated information.",
  "",
  "> The board did not disappear.",
  "> They initiated the event.",
  "",
  "> Authorization records remain inconsistent.",
  "",
  "> One question remains:"
];

let i = 0;
const contentDiv = document.getElementById("content");

// ===== TYPEWRITER EFFECT =====
function typeLine() {
  if(i < lines.length) {
    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if(j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 400);
      }
    }, 20);

  } else {
    triggerFinal();
  }
}

// ===== FINAL SEQUENCE =====
function triggerFinal() {

  document.body.classList.add("glitch");

  const finalQ = document.createElement("p");
  finalQ.className = "warning";
  finalQ.innerHTML = "<br>> WHO APPROVED THE DIRECTIVE?";
  contentDiv.appendChild(finalQ);

  setTimeout(() => {
    showNextPhase();
  }, 2000);
}

// ===== NEXT PHASE (LOCK + LINK) =====
function showNextPhase() {

  // mark Day 2 complete
  localStorage.setItem("day2Complete", "true");

  const container = document.getElementById("nextPhase");

  const p1 = document.createElement("p");
  p1.innerHTML = "> Final phase available.";

  const p2 = document.createElement("p");
  p2.innerHTML = "> Awaiting investigator authorization...";

  const link = document.createElement("a");
  link.href = "../terminal_day3.html";
  link.className = "next-link";
  link.innerHTML = "> INITIATE FINAL PHASE";

  container.appendChild(p1);
  container.appendChild(p2);
  container.appendChild(document.createElement("br"));
  container.appendChild(link);
}

// ===== INIT =====
window.onload = () => {
  setTimeout(typeLine, 800);
};

</script>

</body>
</html>

  0% { transform: translate(0,0); }
  25% { transform: translate(2px,-2px); }
  50% { transform: translate(-2px,2px); }

```

  </style>
</head>
<body>

<div class="terminal">

  <h1>ACCESS GRANTED</h1>
  <p>> Loading restricted file...</p>

  <div id="content"></div>

</div>

<script>

const lines = [
  "> Project: SILENT DIRECTIVE",
  "> Classification: LEVEL 5",
  "> Status: ACTIVE",
  "",
  "> Reviewing executive activity logs...",
  "> Cross-referencing disappearance timeline...",
  "",
  "> WARNING: DATA INCONSISTENCY DETECTED",
  "",
  "> Board disappearance was NOT random.",
  "> Event was internally coordinated.",
  "",
  "> Multiple executives flagged high-risk.",
  "",
  "> Directive authorization requires unanimous approval...",
  "",
  "> ...but approval record is incomplete.",
  "",
  "> One authorization remains unverified.",
  "",
  "> INITIATING TRACE...",
];

let i = 0;
const contentDiv = document.getElementById("content");

function typeLine() {
  if(i < lines.length) {
    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if(j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 400);
      }
    }, 20);

  } else {
    triggerFinal();
  }
}

function triggerFinal() {
  document.body.classList.add("glitch");

  const warning = document.createElement("p");
  warning.className = "warning";
  warning.innerHTML = "> TRACE INTERRUPTED<br>> SOURCE BLOCKED";
  contentDiv.appendChild(warning);

  setTimeout(() => {
    const finalMsg = document.createElement("p");
    finalMsg.innerHTML = "<br>> You were not supposed to find this.";
    contentDiv.appendChild(finalMsg);
  }, 1500);
}

window.onload = () => {
  setTimeout(typeLine, 800);
};
  
</script>

</body>

<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final Result — System Compromise</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="terminal">

  <h1>FINAL RESULT</h1>
  <p>> Processing conclusion...</p>

  <div id="content"></div>

</div>

<script>

const lines = [
  "> Verifying system logs...",
  "> Running integrity checks...",
  "",
  "> WARNING: DATA CORRUPTION DETECTED",
  "",
  "> Log inconsistencies confirmed.",
  "> Timestamp anomalies identified.",
  "",
  "> No external intrusion detected.",
  "> All actions executed under valid credentials.",
  "",
  "> Directive origin cannot be verified.",
  "",
  "> Conclusion:",
  "> SYSTEM INTEGRITY COMPROMISED",
  "",
  "> Recorded truth may not reflect actual events."
];

let i = 0;
const contentDiv = document.getElementById("content");

function typeLine() {
  if(i < lines.length) {
    const p = document.createElement("p");
    contentDiv.appendChild(p);

    let text = lines[i];
    let j = 0;

    const interval = setInterval(() => {
      p.textContent = text.slice(0, j++);
      if(j > text.length) {
        clearInterval(interval);
        i++;
        setTimeout(typeLine, 400);
      }
    }, 20);

  } else {
    triggerFinal();
  }
}

function triggerFinal() {
  const finalMsg = document.createElement("p");
  finalMsg.innerHTML = "<br>> Your conclusion has been recorded.";
  contentDiv.appendChild(finalMsg);
}

window.onload = () => {
  setTimeout(typeLine, 800);
};

</script>

  <script>
setTimeout(() => {
  window.location.href = "final_shutdown.html";
}, 6000);
</script>

</body>
</html>

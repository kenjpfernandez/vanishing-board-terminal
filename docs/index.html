<h1>Vanishing Board Terminal</h1>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ICIU Entry Point</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body.glitch {
      animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(2px, -2px); }
      50% { transform: translate(-2px, 2px); }
      75% { transform: translate(2px, 2px); }
      100% { transform: translate(0px, 0px); }
    }

    .hidden { color: black; }
  </style>
</head>
<body>

<div class="terminal">
  <h1 id="title"></h1>

  <div id="boot"></div>

  <br>

  <div id="commandSection" style="display:none;">
    <p>> Enter command to proceed:</p>
    <input type="text" id="commandInput" placeholder="TYPE COMMAND" autofocus>
    <button onclick="runCommand()">EXECUTE</button>
    <p id="commandResponse"></p>
  </div>
</div>

<script>
const bootLines = [
  "> Booting ICIU Secure Interface...",
  "> Establishing encrypted channel...",
  "> Verifying system integrity...",
  "> Loading executive activity logs...",
  "> WARNING: Board status = OFFLINE",
  "> Anomaly detected in last 72 hours",
  "> Trace initiated...",
  "> ERROR: Access logs partially corrupted",
  "> Restoring minimal interface...",
  "> System ready"
];

let i = 0;
const bootDiv = document.getElementById("boot");
const title = document.getElementById("title");

function typeLine(text, callback) {
  let index = 0;
  const line = document.createElement("p");
  bootDiv.appendChild(line);

  const interval = setInterval(() => {
    line.textContent = text.slice(0, index++);
    if(index > text.length) {
      clearInterval(interval);
      setTimeout(callback, 300);
    }
  }, 20);
}

function runBoot() {
  if(i < bootLines.length) {
    typeLine(bootLines[i], () => {
      i++;
      runBoot();
    });
  } else {
    document.getElementById("commandSection").style.display = "block";

    // Trigger random glitch after boot
    setTimeout(triggerGlitch, 3000);
  }
}

function triggerGlitch() {
  document.body.classList.add("glitch");
  setTimeout(() => {
    document.body.classList.remove("glitch");

    const msg = document.createElement("p");
    msg.innerHTML = "> UNKNOWN PROCESS DETECTED...";
    bootDiv.appendChild(msg);

  }, 800);
}

function runCommand() {
  const input = document.getElementById("commandInput").value.trim().toUpperCase();
  const response = document.getElementById("commandResponse");

  if(input === "INITIATE" || input === "ACCESS") {
    response.innerHTML = "> ACCESS GRANTED... Redirecting...";
    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } else if(input === "SD-INIT") {
    // Hidden command
    document.body.classList.add("glitch");
    response.innerHTML = "> OVERRIDE DETECTED...\n> ACCESSING HIDDEN PROTOCOL...";

    setTimeout(() => {
      window.location.href = "terminal.html";
    }, 2000);

  } else if(input === "HELP") {
    response.innerHTML = "> Available commands: INITIATE, ACCESS";

  } else if(input === "TRACE") {
    response.innerHTML = "> TRACE IN PROGRESS...\n> SIGNAL BLOCKED";

  } else {
    response.innerHTML = "> INVALID COMMAND";
  }
}

// Title typing
let t = "ICIU SECURE TERMINAL";
let ti = 0;
function typeTitle() {
  title.textContent = t.slice(0, ti++);
  if(ti <= t.length) setTimeout(typeTitle, 50);
}

// Start sequence
window.onload = () => {
  typeTitle();
  setTimeout(runBoot, 800);
};
</script>

</body>
</html>

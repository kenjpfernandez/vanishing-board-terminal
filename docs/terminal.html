<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ICIU Terminal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="terminal">

  <h1>ICIU INVESTIGATION TERMINAL</h1>
  <p>Status: <span class="status">BOARD OFFLINE</span></p>

  <p id="teamDisplay"></p>
  <p id="progress">Progress: 0 / 3 Evidence Verified</p>

  <hr>

  <h2>MODULES</h2>
  <ul>
  <li><a href="https://thermofisher-my.sharepoint.com/:f:/p/kennethjay_fernandez/IgBtnbG2PF9nQ534UUEqYUxMAdY1ia5FG9iFFeUxuFa2iJI?e=7TeUvq" target="_blank">[1] Email Archive</a></li>

  <li id="mod2" class="locked">[2] Calendar System 🔒</li>
  <li id="mod3" class="locked">[3] Financial Records 🔒</li>
  <li id="mod4" class="locked">[4] HR Database 🔒</li>
</ul>

  <hr>

  <h2>ENTER ACCESS CODE</h2>

  <input type="text" id="codeInput" placeholder="Enter code">
  <button onclick="checkCode()">SUBMIT</button>

  <p id="response"></p>

</div>

<script>

// ===== TEAM DISPLAY =====
const team = localStorage.getItem("teamName") || "UNKNOWN";
document.getElementById("teamDisplay").innerHTML = `> Team: ${team}`;

// ===== PROGRESS TRACKING =====
let progress = {
  code1: false,
  code2: false,
  code3: false
};

function updateProgress() {
  const count = Object.values(progress).filter(v => v).length;
  document.getElementById("progress").innerHTML =
    `Progress: ${count} / 3 Evidence Verified`;
}

// ===== CODE SYSTEM =====
function checkCode() {
  const code = document.getElementById("codeInput").value.trim().toUpperCase();
  const response = document.getElementById("response");

  if(code === "0412" && !progress.code1) {
    progress.code1 = true;
    response.innerHTML = "✔ Meeting Code Verified";

  } else if(code === "19:00" && !progress.code2) {
    progress.code2 = true;
    response.innerHTML = "✔ Timeline Conflict Logged";

  } else if(code === "ACCT-7781" && !progress.code3) {
    progress.code3 = true;
    response.innerHTML = "✔ Financial Anomaly Flagged";

  } else if(code === "SILENTDIRECTIVE") {

    if(progress.code1 && progress.code2 && progress.code3) {
      response.innerHTML = "⚠ ACCESS GRANTED...";
      setTimeout(() => {
        window.location.href = "puzzles/day1_end.html";
      }, 1500);
    } else {
      response.innerHTML = "✖ INCOMPLETE DATA. MORE EVIDENCE REQUIRED.";
    }

  } else {
    response.innerHTML = "✖ INVALID OR ALREADY USED CODE";
  }

  updateProgress();
}

</script>

</body>
</html>
